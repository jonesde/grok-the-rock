<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="images/ico/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="images/ico/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/ico/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="images/ico/apple-touch-icon.png">
<title>Grok the Rock — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css">
<style>
  .home-grid {
    min-height: calc(100vh - 4.5rem);
    display: flex;
    flex-wrap: wrap;
    gap: clamp(1rem, 4vw, 3rem);
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    box-sizing: border-box;
  }
  .home-grid a { display: block; }
  .home-grid img {
    width: 512px;
    height: auto;
    max-width: min(512px, 90vw);
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(40,30,20,0.18);
    transition: transform .15s ease;
  }
  .home-grid a:hover img,
  .home-grid a:focus-visible img { transform: translateY(-4px); }
  .booktext-link {
    position: fixed;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    z-index: 50;
    font-size: 24px;
    font-family: "Fraunces", "Iowan Old Style", Palatino, Georgia, serif;
    color: #1b1108;
    text-decoration: none;
    background: rgba(239,231,216,0.92);
    border: 1px solid rgba(150,140,120,0.45);
    border-bottom: none;
    border-radius: 12px 12px 0 0;
    padding: 0.5rem 1.4rem;
    box-shadow: 0 -4px 16px rgba(40,30,20,0.14);
    transition: transform .15s ease, background .15s ease;
  }
  .booktext-link:hover,
  .booktext-link:focus-visible {
    background: rgba(239,231,216,1);
    transform: translateX(-50%) translateY(-3px);
  }
  /* Direction-aware variant: LTR default, RTL when the page is RTL */
  .booktext-link .bt-rtl { display: none; }
  html[dir="rtl"] .booktext-link .bt-ltr { display: none; }
  html[dir="rtl"] .booktext-link .bt-rtl { display: inline; }
</style>
</head>
<body>
  <main class="home-grid">
    <a href="quiet-stories.html" aria-label="Grok the Rock: Three Quiet Stories">
      <img src="images/ico/icon-512.png" width="512" height="512" alt="Grok the Rock: Three Quiet Stories">
    </a>
    <a href="tall-tales.html" aria-label="Hai Ikthiss: Three Tall Tales">
      <img src="images/ico/icon-hai-512.png" width="512" height="512" alt="Hai Ikthiss: Three Tall Tales">
    </a>
    <a href="book-text.html" class="booktext-link" aria-label="Read the full book text">
      <span class="bt-ltr" lang="he" dir="ltr" aria-hidden="true">ז = ו + י</span>
      <span class="bt-rtl" lang="he" dir="rtl" aria-hidden="true">י + ו = ז</span>
    </a>
  </main>
  <script src="vendor/fflate.min.js"></script>
  <script src="lang/en.js"></script>
  <script src="lang/es.js"></script>
  <script src="site.js"></script>
</body>
</html>
